name: Build & Distribute APK

on:
  push:
    branches: [main]
  workflow_dispatch:             # lets you trigger manually from GitHub UI

jobs:
  build-and-distribute:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Runtime ───────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: stable
          cache: true

      # ── 3. Dependencies ──────────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 4. Build ─────────────────────────────────────────────────────────────
      - name: Build release APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}

      # ── 5. Upload to Firebase App Distribution ───────────────────────────────
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: "Build from commit ${{ github.sha }}"

      # ── 6. Keep APK as artifact (optional — useful for debugging) ─────────────
      - name: Save APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

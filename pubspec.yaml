name: ahara
description: "Ahara — Your weekly Indian meal plan"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  cached_network_image: ^3.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  firebase_auth: ^5.5.4
  firebase_core: ^3.13.1
  firebase_messaging: ^15.1.3
  flutter:
    sdk: flutter
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^3.1.0
  flutter_timezone: ^3.0.0
  freezed_annotation: ^3.1.0
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  json_annotation: ^4.9.0
  package_info_plus: ^8.0.0
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.5.3

dev_dependencies:
  build_runner: ^2.4.16
  custom_lint: ^0.8.0
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  freezed: ^3.2.0
  json_serializable: ^6.8.0
  riverpod_generator: ^4.0.0
  riverpod_lint: ^3.1.0
  very_good_analysis: ^7.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/

# App launcher icon — generated from the logo mark on a navy backdrop.
# Regenerate after changing the source: `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E1B2E"
  adaptive_icon_foreground: "assets/app_icon_foreground.png"
